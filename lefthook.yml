pre-commit:
  commands:
    miniapp-build:
      glob: "miniapp-src/**/*"
      run: npm run miniapp:build && git add public/miniapp
    authoring-build:
      glob: "authoring-src/**/*"
      run: npm run authoring:build && git add public/course-authoring

pre-push:
  parallel: true
  commands:
    db-check:
      run: npm run db:check
    lint:
      run: npm run lint
