<!DOCTYPE html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Мои карточки</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <link rel="stylesheet" href="/miniapp/styles.css">
  <link rel="stylesheet" href="/miniapp/swipe/cardSwipe.css">
</head>

<body>
  <div id="app">
    <header class="header">
      <h1 class="header__title">Мои карточки</h1>
      <div class="header__tabs">
        <button class="tab tab--active" data-view="cards">📚 Карточки</button>
        <button class="tab" data-view="calendar">📅 Календарь</button>
        <button class="tab" data-view="stats">📊 Статистика</button>
      </div>
    </header>

    <main class="main">
      <!-- Cards View -->
      <div class="view view--active" data-view="cards">
        <div class="filters">
          <select id="statusFilter" class="filter-select">
            <option value="">Все статусы</option>
            <option value="pending">⏳ Ожидают</option>
            <option value="learning">📖 Изучаются</option>
            <option value="awaiting_grade">⏱️ Ждут оценки</option>
            <option value="archived">📦 Архив</option>
          </select>
        </div>

        <div id="cardsList" class="cards-list">
          <div class="loading">Загрузка...</div>
        </div>
      </div>

      <!-- Card Detail View -->
      <div class="view" data-view="card-detail">
        <div class="card-detail">
          <div class="card-detail__nav">
            <button class="back-button" id="cardBackBtn" type="button">← Назад</button>
          </div>
          <div id="cardDetailContent"></div>
        </div>
      </div>

      <!-- Calendar View -->
      <div class="view" data-view="calendar">
        <div class="calendar">
          <div id="calendarContent" class="calendar__content">
            <div class="loading">Загрузка календаря...</div>
          </div>
        </div>
      </div>

      <!-- Stats View -->
      <div class="view" data-view="stats">
        <div id="statsContent" class="stats">
          <div class="loading">Загрузка статистики...</div>
        </div>
      </div>
    </main>
  </div>

  <div class="confirm-overlay is-hidden" id="confirmOverlay" role="dialog" aria-modal="true" aria-hidden="true">
    <div class="confirm-card" role="document">
      <h2 class="confirm-title" id="confirmTitle"></h2>
      <p class="confirm-body" id="confirmBody"></p>
      <div class="confirm-actions">
        <button class="secondary-button" id="confirmCancel" type="button">Отмена</button>
        <button class="primary-button" id="confirmConfirm" type="button">Подтвердить</button>
      </div>
    </div>
  </div>

  <script src="/miniapp/linkUtils.js"></script>
  <script src="/miniapp/swipe/cardSwipe.js"></script>
  <script src="/miniapp/app.js"></script>
</body>

</html>
